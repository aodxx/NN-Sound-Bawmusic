<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bawmusic — Band Booking OS</title>
<meta name="theme-color" content="#08080d">
<meta name="description" content="ระบบจัดการการจองงานวงดนตรีครบวงจร">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bawmusic">

<script>
  // ตั้งค่าธีมก่อนวาดหน้าจอ เพื่อไม่ให้กระพริบ
  (function () {
    var saved = localStorage.getItem('bawmusic_theme_override');
    var theme;
    if (saved === 'light' || saved === 'dark') {
      theme = saved;
    } else {
      var hour = new Date().getHours();
      theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', theme);
    document.addEventListener('DOMContentLoaded', function () {
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'light' ? '#f5f3ff' : '#08080d');
    });
  })();
</script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="css/style.css?v=3.5.0">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { kanit: ['Kanit', 'sans-serif'], prompt: ['Prompt', 'sans-serif'] },
        colors: {
          navy: { DEFAULT: '#13131f', dark: '#08080d', light: '#1e1e30' },
          gold: { DEFAULT: '#22d3ee', light: '#67e8f9', dark: '#0891b2' },
          neon: { DEFAULT: '#f637ec', light: '#f9a8f4', dark: '#a21caf' }
        }
      }
    }
  }
</script>
</head>
<body class="font-kanit bg-navy-dark text-gray-100 min-h-screen pb-28" x-data="app()" x-init="init()">

<div id="auth-gate" class="hidden-init fixed inset-0 z-[100] flex items-center justify-center bg-navy-dark px-5">
  <div class="w-full max-w-sm rounded-3xl border border-gold/20 bg-navy-light p-6 text-center shadow-2xl">
    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-gold to-neon text-navy-dark text-2xl"><i class="fa-solid fa-lock"></i></div>
    <h2 class="text-lg font-bold text-white">เข้าสู่ระบบ Bawmusic</h2>
    <p class="mt-2 text-sm text-gray-400">กรอกรหัสเข้าใช้งานระบบเพื่อเข้าถึงข้อมูลการจองและการเงิน</p>
    <form id="auth-form" class="mt-5" novalidate>
      <input id="access-code" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="รหัสเข้าใช้งาน" aria-label="รหัสเข้าใช้งาน" class="w-full rounded-xl border border-cyan-300/30 bg-slate-900 px-4 py-3 text-center text-white outline-none" style="color:#fff !important; -webkit-text-fill-color:#fff; caret-color:#22d3ee; background-color:#0f172a; font-size:1.15rem; letter-spacing:.18em;">
      <button id="access-submit" type="submit" class="mt-3 w-full rounded-xl bg-cyan-400 px-4 py-3 font-semibold text-slate-950 disabled:cursor-wait disabled:opacity-60">เข้าใช้งานระบบ</button>
    </form>
    <p id="auth-status" aria-live="polite" class="mt-3 min-h-5 text-sm font-medium text-cyan-700"></p>
    <p id="auth-error" aria-live="assertive" class="mt-2 min-h-5 text-sm font-medium text-red-600"></p>
  </div>
</div>

<!-- ===== TOP BAR ===== -->
<header class="sticky top-0 z-40 bg-navy/90 backdrop-blur-lg border-b border-gold/10 px-4 py-3 flex items-center justify-between shadow-sm">
  <div class="flex items-center gap-2.5">
    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-gold to-neon flex items-center justify-center shadow-md shadow-gold/30">
      <i class="fa-solid fa-music text-navy-dark text-base"></i>
    </div>
    <div>
      <h1 class="text-base font-bold text-gold leading-none tracking-wide" x-text="settings.bandName || 'Bawmusic'"></h1>
      <p class="text-base text-gray-400 leading-none mt-1" x-text="viewTitles[currentView]"></p>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button x-show="pendingBookingCount > 0" @click="openPendingBookings()" type="button"
      class="relative flex h-11 w-11 items-center justify-center rounded-2xl bg-rose-500/10 text-rose-300 active:scale-90 transition-transform"
      :aria-label="'มีคำขอจองรอยืนยัน ' + pendingBookingCount + ' รายการ'">
      <i class="fa-solid fa-bell"></i>
      <span class="pending-notification-dot absolute right-2 top-2" aria-hidden="true"></span>
      <span class="pending-notification-badge absolute -right-1 -top-1" x-text="pendingBookingCount > 99 ? '99+' : pendingBookingCount"></span>
    </button>
    <button x-show="!isStandalone()" @click="installApp()" class="w-11 h-11 rounded-2xl bg-navy-light/80 flex items-center justify-center text-gold active:scale-90 transition-transform">
      <i class="fa-solid fa-arrow-down-to-bracket"></i>
    </button>
    <button @click="toggleDarkMode()" class="w-11 h-11 rounded-2xl bg-navy-light/80 flex items-center justify-center text-gold active:scale-90 transition-transform">
      <i class="fa-solid" :class="darkMode ? 'fa-moon' : 'fa-sun'"></i>
    </button>
  </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="px-4 py-4 max-w-2xl mx-auto">

  <!-- Loading State -->
  <template x-if="loading">
    <div class="space-y-4">
      <div class="rounded-2xl border border-gold/10 bg-navy-light/80 p-5 text-center shadow-sm">
        <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-gold/20 border-t-gold"></div>
        <p class="mt-3 text-base font-medium text-gold" x-text="loadingMessage"></p>
        <p x-show="loadingTimedOut" x-text="loadingDetail" class="mt-1 text-sm text-gray-500"></p>
        <button x-show="loadingTimedOut" @click="retryLoading()" class="mt-4 rounded-xl bg-gold/15 px-4 py-2 text-sm font-medium text-gold">
          ลองโหลดใหม่
        </button>
      </div>
      <div class="space-y-3 animate-pulse" aria-hidden="true">
        <div class="h-24 bg-navy-light rounded-2xl"></div>
        <div class="h-24 bg-navy-light rounded-2xl"></div>
        <div class="h-24 bg-navy-light rounded-2xl"></div>
      </div>
    </div>
  </template>

  <div x-show="!loading" x-cloak>
    <div x-show="currentView === 'dashboard'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-dashboard"></div>
    </div>
    <div x-show="currentView === 'bookings'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-bookings"></div>
    </div>
    <div x-show="currentView === 'customers'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-customers"></div>
    </div>
    <div x-show="currentView === 'equipment'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-equipment"></div>
    </div>
    <div x-show="currentView === 'analytics'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-analytics"></div>
    </div>
    <div x-show="currentView === 'history'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-history"></div>
    </div>
    <div x-show="currentView === 'settings'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
      <div id="view-settings"></div>
    </div>
  </div>
</main>

<!-- ===== INSTALL APP BANNER ===== -->
<div x-show="showInstallBanner" x-cloak x-transition
  class="fixed bottom-40 left-3 right-3 z-40 max-w-2xl mx-auto bg-gradient-to-r from-gold to-neon rounded-2xl p-3.5 shadow-lg shadow-gold/40 flex items-center gap-3">
  <div class="w-11 h-11 rounded-xl bg-navy-dark flex items-center justify-center flex-shrink-0">
    <i class="fa-solid fa-music text-gold"></i>
  </div>
  <div class="flex-1 min-w-0">
    <p class="text-base font-semibold text-navy-dark leading-tight">ติดตั้ง Bawmusic ลงหน้าจอหลัก</p>
    <p class="text-base text-navy-dark/80 leading-tight mt-0.5">
      <template x-if="env.isInAppBrowser"><span x-text="'เปิดใน ' + env.inAppName + ' — แตะ ⋮ แล้วเลือก เปิดในเบราว์เซอร์'"></span></template>
      <template x-if="!env.isInAppBrowser && env.isIOS"><span>แตะปุ่มแชร์ แล้วเลือก เพิ่มไปยังหน้าจอโฮม</span></template>
      <template x-if="!env.isInAppBrowser && !env.isIOS"><span>ใช้งานได้เหมือนแอปจริง แม้ออฟไลน์</span></template>
    </p>
  </div>
  <button @click="installApp()" class="bg-navy-dark text-gold text-base font-semibold px-4 py-3 rounded-xl flex-shrink-0">ติดตั้ง</button>
  <button @click="dismissInstallBanner()" class="text-navy-dark/60 px-1 flex-shrink-0"><i class="fa-solid fa-xmark"></i></button>
</div>

<!-- ===== FLOATING ACTION BUTTON ===== -->
<button x-show="['dashboard','bookings'].includes(currentView)" @click="window.openBookingForm()"
  class="fixed bottom-28 right-5 z-40 w-14 h-14 rounded-full bg-gradient-to-br from-gold to-neon shadow-lg shadow-gold/40 flex items-center justify-center text-navy-dark text-2xl active:scale-90 transition-transform">
  <i class="fa-solid fa-plus"></i>
</button>

<!-- ===== BOTTOM NAVIGATION ===== -->
<nav class="fixed bottom-3 left-3 right-3 z-40 pb-safe">
  <div class="max-w-2xl mx-auto grid grid-cols-5 gap-1 bg-navy/90 backdrop-blur-lg border border-gold/10 rounded-3xl px-2 py-3 shadow-xl shadow-black/20">
    <template x-for="item in navItems" :key="item.view">
      <button @click="setView(item.view)" class="relative flex flex-col items-center gap-1 py-3 rounded-2xl transition-all duration-200"
        :class="currentView === item.view ? 'text-gold bg-gold/10' : 'text-gray-500'">
        <i class="fa-solid text-lg" :class="item.icon"></i>
        <span class="text-base font-medium" x-text="item.label"></span>
        <template x-if="item.view === 'bookings' && pendingBookingCount > 0">
          <span class="pending-notification-badge absolute right-2 top-1" x-text="pendingBookingCount > 99 ? '99+' : pendingBookingCount"></span>
        </template>
      </button>
    </template>
  </div>
</nav>

<!-- ===== MODAL CONTAINER (booking form, etc.) ===== -->
<div id="modal-root"></div>

<!-- Toast container handled by SweetAlert2 -->

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="js/api.js?v=3.6.0"></script>
<script src="js/utils.js?v=3.5.0"></script>
<script>
  // ดักจับ error ที่ไม่ถูกจัดการทั้งหมด แสดงผลให้เห็นแทนหน้าจอขาวเงียบๆ
  window.addEventListener('error', function (e) {
    console.error('Bawmusic error:', e.error || e.message);
    if (window.Utils && window.Swal) {
      Utils.toast('error', 'เกิดข้อผิดพลาด: ' + (e.message || 'unknown error'));
    }
  });
  window.addEventListener('unhandledrejection', function (e) {
    console.error('Bawmusic unhandled promise rejection:', e.reason);
    if (window.Utils && window.Swal) {
      Utils.toast('error', 'เกิดข้อผิดพลาด: ' + (e.reason?.message || e.reason || 'unknown error'));
    }
  });
</script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/bookings.js?v=3.5.0"></script>
<script src="js/views/customers.js?v=3.3.2"></script>
<script src="js/views/equipment.js?v=3.3.1"></script>
<script src="js/views/analytics.js"></script>
<script src="js/views/history.js?v=2.5.0"></script>
<script src="js/paymentManager.js?v=3.6.0"></script>
<script src="js/views/settings.js"></script>
<script src="js/views/bookingForm.js?v=3.6.0"></script>
<script src="js/views/jobSummary.js"></script>
<script src="js/app.js?v=3.5.0"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('service-worker.js?v=3.5.0').catch(function (e) { console.warn('SW registration failed', e); });
    });
  }
</script>
</body>
</html>
